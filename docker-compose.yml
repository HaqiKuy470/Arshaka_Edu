version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: arshaka_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: arshaka_edu
      POSTGRES_USER: arshaka
      POSTGRES_PASSWORD: arshaka_secret_2025
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arshaka -d arshaka_edu"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: arshaka_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@arshaka.edu
      PGADMIN_DEFAULT_PASSWORD: arshaka_admin_2025
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
